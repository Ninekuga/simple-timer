<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>倒數計時器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px;
            text-align: center;
        }

        h1 {
            color: #e0e0e0;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .header-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-add {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            touch-action: manipulation;
        }

        .btn-add:hover {
            background: #7b8ff0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .stats {
            color: #b0b0b0;
            font-size: 1.1em;
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }

        #timer-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 0;
        }

        .timer-card {
            background: #2d2d44;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .timer-card.running {
            box-shadow: 0 8px 30px rgba(76, 175, 80, 0.3);
            border: 2px solid #66bb6a;
        }

        .timer-card.paused {
            box-shadow: 0 8px 30px rgba(255, 152, 0, 0.3);
            border: 2px solid #ffb74d;
        }

        .timer-card.finished {
            box-shadow: 0 8px 30px rgba(244, 67, 54, 0.3);
            border: 2px solid #ef5350;
        }

        .timer-card.idle {
            border: 2px solid transparent;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #e0e0e0;
            flex: 1;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .timer-name:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .timer-name:focus {
            outline: 2px solid #667eea;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-delete {
            background: #ef5350;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .btn-delete:hover {
            background: #e53935;
            transform: scale(1.1);
        }

        .time-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: #1f1f2e;
            padding: 15px;
            border-radius: 10px;
        }

        .time-input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .time-input-group label {
            font-size: 0.85em;
            color: #9e9e9e;
            font-weight: 600;
            text-transform: uppercase;
        }

        .time-input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #404050;
            border-radius: 5px;
            font-size: 1.1em;
            text-align: center;
            font-weight: 600;
            background: #2d2d44;
            color: #e0e0e0;
            transition: border-color 0.2s;
        }

        .time-input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: #353545;
        }

        .time-input-group input::-webkit-inner-spin-button,
        .time-input-group input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        .time-input-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .display-time {
            font-size: 3em;
            font-weight: 700;
            text-align: center;
            color: #66bb6a;
            font-family: 'Courier New', monospace;
            padding: 20px;
            background: #1f1f2e;
            border-radius: 10px;
            letter-spacing: 5px;
        }

        .finished-badge {
            display: none;
            text-align: center;
            color: #ef5350;
            font-weight: 600;
            font-size: 1.1em;
        }

        .timer-card.finished .finished-badge {
            display: block;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn-control {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            touch-action: manipulation;
        }

        .btn-start {
            background: #66bb6a;
            color: white;
        }

        .btn-start:hover {
            background: #81c784;
        }

        .btn-pause {
            background: #ffb74d;
            color: white;
        }

        .btn-pause:hover {
            background: #fcc86f;
        }

        .btn-reset {
            background: #64b5f6;
            color: white;
        }

        .btn-reset:hover {
            background: #82c4f9;
        }

        .btn-control:active {
            transform: scale(0.98);
        }

        .btn-control:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-stop-sound {
            background: #9c27b0 !important;
        }

        .btn-stop-sound:hover {
            background: #b439d6 !important;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .pikmin-global-settings {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .pikmin-settings-label {
            color: #b0b0b0;
            font-size: 0.95em;
            white-space: nowrap;
        }

        .pikmin-inputs {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pikmin-inputs input {
            width: 52px;
            padding: 6px 4px;
            border: 1px solid #404050;
            border-radius: 5px;
            font-size: 0.95em;
            text-align: center;
            font-weight: 600;
            background: #2d2d44;
            color: #e0e0e0;
            transition: border-color 0.2s;
        }

        .pikmin-inputs input:focus {
            outline: none;
            border-color: #667eea;
            background: #353545;
        }

        .pikmin-inputs input::-webkit-inner-spin-button,
        .pikmin-inputs input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            appearance: none;
        }

        .pikmin-inputs input[type="number"] {
            -moz-appearance: textfield;
        }

        .pikmin-inputs span {
            color: #b0b0b0;
            font-size: 0.9em;
        }

        .pikmin-toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 2px;
        }

        .toggle-label {
            color: #9e9e9e;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            user-select: none;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #404050;
            border-radius: 24px;
            transition: background 0.25s;
            touch-action: manipulation;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.25s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: #667eea;
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }

        .toggle-switch input:disabled + .toggle-slider {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .toggle-switch input:focus-visible + .toggle-slider {
            outline: 2px solid #667eea;
            outline-offset: 2px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            #timer-grid {
                grid-template-columns: 1fr;
            }

            .display-time {
                font-size: clamp(1.6em, 8vw, 2.2em);
                letter-spacing: clamp(1px, 1vw, 3px);
            }

            .time-inputs {
                grid-template-columns: repeat(3, 1fr);
            }

            .time-input-group input {
                font-size: 16px;
            }

            .timer-name {
                font-size: 16px;
            }

            .card-actions {
                flex-direction: column;
            }

            .btn-control {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>⏱️ 倒數計時器</h1>
        <div class="header-controls">
            <button class="btn-add" id="btn-add-timer">+ 新增計時器</button>
        </div>
        <div class="pikmin-global-settings">
            <span class="pikmin-settings-label">皮克敏附加時間：</span>
            <div class="pikmin-inputs">
                <input type="number" id="pikmin-hours"   min="0" max="23" value="00" inputmode="numeric" pattern="[0-9]*">
                <span>時</span>
                <input type="number" id="pikmin-minutes" min="0" max="59" value="04" inputmode="numeric" pattern="[0-9]*">
                <span>分</span>
                <input type="number" id="pikmin-seconds" min="0" max="59" value="30" inputmode="numeric" pattern="[0-9]*">
                <span>秒</span>
            </div>
        </div>
        <div class="stats">
            <div>運行中: <span id="running-count">0</span></div>
            <div>已完成: <span id="finished-count">0</span></div>
        </div>
    </header>

    <main id="timer-grid"></main>

    <script>
        class TimerCard {
            constructor(id) {
                this.id = id;
                this.state = 'idle';
                this.hours = 0;
                this.minutes = 0;
                this.seconds = 5;
                this.pikminEnabled = true;
                this.remainingSeconds = 5 + pikminOffsetSeconds;
                this.intervalId = null;
                this.startTime = null;
                this.initialRemaining = 5 + pikminOffsetSeconds;

                this.createDOM();
                this.bindEvents();
            }

            createDOM() {
                this.element = document.createElement('div');
                this.element.className = 'timer-card idle';
                this.element.innerHTML = `
                    <div class="card-header">
                        <input type="text" class="timer-name" value="Timer ${this.id}">
                        <button class="btn-delete">✕</button>
                    </div>

                    <div class="time-inputs">
                        <div class="time-input-group">
                            <label>時</label>
                            <input type="number" class="input-hours" min="0" max="23" value="00" inputmode="numeric" pattern="[0-9]*">
                        </div>
                        <div class="time-input-group">
                            <label>分</label>
                            <input type="number" class="input-minutes" min="0" max="59" value="00" inputmode="numeric" pattern="[0-9]*">
                        </div>
                        <div class="time-input-group">
                            <label>秒</label>
                            <input type="number" class="input-seconds" min="0" max="59" value="05" inputmode="numeric" pattern="[0-9]*">
                        </div>
                    </div>

                    <div class="pikmin-toggle-row">
                        <label class="toggle-switch">
                            <input type="checkbox" class="pikmin-toggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="toggle-label">皮克敏模式</span>
                    </div>

                    <div class="display-time">00:00:00</div>
                    <div class="finished-badge">時間到！</div>

                    <div class="card-actions">
                        <button class="btn-control btn-start">開始</button>
                        <button class="btn-control btn-reset">重置</button>
                        <button class="btn-control btn-stop-sound" style="display: none; background: #9c27b0;">關閉提示音</button>
                    </div>
                `;

                document.getElementById('timer-grid').appendChild(this.element);

                this.displayEl = this.element.querySelector('.display-time');
                this.inputHours = this.element.querySelector('.input-hours');
                this.inputMinutes = this.element.querySelector('.input-minutes');
                this.inputSeconds = this.element.querySelector('.input-seconds');
                this.btnStart = this.element.querySelector('.btn-start');
                this.btnReset = this.element.querySelector('.btn-reset');
                this.btnDelete = this.element.querySelector('.btn-delete');
                this.btnStopSound = this.element.querySelector('.btn-stop-sound');
                this.pikminToggle = this.element.querySelector('.pikmin-toggle');

                this.updateDisplay();
            }

            bindEvents() {
                this.btnStart.addEventListener('click', () => this.toggleStart());
                this.btnReset.addEventListener('click', () => this.reset());
                this.btnDelete.addEventListener('click', () => this.destroy());
                this.btnStopSound.addEventListener('click', () => stopBeep());

                [this.inputHours, this.inputMinutes, this.inputSeconds].forEach(input => {
                    input.addEventListener('change', () => this.updateFromInputs());
                });

                this.pikminToggle.addEventListener('change', () => {
                    this.pikminEnabled = this.pikminToggle.checked;
                    if (this.state === 'idle') this.applyPikminOffset();
                });
            }

            toggleStart() {
                unlockAudio();
                if (this.state === 'idle' || this.state === 'paused') {
                    this.start();
                } else if (this.state === 'running') {
                    this.pause();
                }
            }

            start() {
                if (this.state === 'finished') return;

                this.state = 'running';
                this.startTime = Date.now() - (this.initialRemaining - this.remainingSeconds) * 1000;
                this.updateDisplay();
                this.updateButtons();
                this.updateCardState();
                this.hideStopSoundBtn();

                this.intervalId = setInterval(() => this.tick(), 100);
                updateStats();
            }

            pause() {
                this.state = 'paused';
                if (this.intervalId) clearInterval(this.intervalId);
                this.updateButtons();
                this.updateCardState();
                updateStats();
            }

            reset() {
                this.state = 'idle';
                if (this.intervalId) clearInterval(this.intervalId);
                this.updateFromInputs();
                this.updateButtons();
                this.updateCardState();
                this.hideStopSoundBtn();
                stopBeep();
                updateStats();
            }

            updateFromInputs() {
                this.hours = Math.max(0, Math.min(23, parseInt(this.inputHours.value) || 0));
                this.minutes = Math.max(0, Math.min(59, parseInt(this.inputMinutes.value) || 0));
                this.seconds = Math.max(0, Math.min(59, parseInt(this.inputSeconds.value) || 0));

                this.inputHours.value = String(this.hours).padStart(2, '0');
                this.inputMinutes.value = String(this.minutes).padStart(2, '0');
                this.inputSeconds.value = String(this.seconds).padStart(2, '0');

                this.applyPikminOffset();
            }

            applyPikminOffset() {
                const base = this.hours * 3600 + this.minutes * 60 + this.seconds;
                const offset = this.pikminEnabled ? pikminOffsetSeconds : 0;
                this.remainingSeconds = base + offset;
                this.initialRemaining = this.remainingSeconds;
                if (this.state === 'idle') this.updateDisplay();
            }

            tick() {
                if (this.state !== 'running') return;

                const elapsed = (Date.now() - this.startTime) / 1000;
                this.remainingSeconds = Math.max(0, this.initialRemaining - elapsed);

                this.updateDisplay();

                if (this.remainingSeconds <= 0) {
                    this.finish();
                }
            }

            updateDisplay() {
                const total = Math.round(this.remainingSeconds);
                const h = Math.floor(total / 3600);
                const m = Math.floor((total % 3600) / 60);
                const s = total % 60;

                this.displayEl.textContent =
                    String(h).padStart(2, '0') + ':' +
                    String(m).padStart(2, '0') + ':' +
                    String(s).padStart(2, '0');
            }

            finish() {
                this.state = 'finished';
                if (this.intervalId) clearInterval(this.intervalId);
                this.remainingSeconds = 0;
                this.updateDisplay();
                this.updateButtons();
                this.updateCardState();
                this.showStopSoundBtn();

                playBeep();
                updateStats();
            }

            showStopSoundBtn() {
                this.btnStopSound.style.display = 'block';
            }

            hideStopSoundBtn() {
                this.btnStopSound.style.display = 'none';
            }

            updateButtons() {
                const canEdit = this.state === 'idle';
                this.inputHours.disabled = !canEdit;
                this.inputMinutes.disabled = !canEdit;
                this.inputSeconds.disabled = !canEdit;
                this.pikminToggle.disabled = !canEdit;

                if (this.state === 'running') {
                    this.btnStart.textContent = '暫停';
                    this.btnStart.className = 'btn-control btn-pause';
                } else {
                    this.btnStart.textContent = '開始';
                    this.btnStart.className = 'btn-control btn-start';
                }

                this.btnStart.disabled = this.state === 'finished';
                this.btnReset.disabled = this.state === 'idle' && this.remainingSeconds === this.initialRemaining;
            }

            updateCardState() {
                this.element.className = 'timer-card ' + this.state;
            }

            destroy() {
                if (this.intervalId) clearInterval(this.intervalId);
                if (this.state === 'finished') {
                    stopBeep();
                }
                this.element.remove();
                const idx = timerCards.indexOf(this);
                if (idx !== -1) timerCards.splice(idx, 1);
                updateStats();
            }
        }

        let sharedAudioContext = null;
        let beepTimeoutId = null;
        let timerCards = [];
        let pikminOffsetSeconds = 270;

        function unlockAudio() {
            try {
                if (!sharedAudioContext || sharedAudioContext.state === 'closed') {
                    sharedAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (sharedAudioContext.state === 'suspended') {
                    sharedAudioContext.resume();
                }
                // iOS requires an actual audio node to be started within the user gesture handler
                const osc = sharedAudioContext.createOscillator();
                const gain = sharedAudioContext.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(sharedAudioContext.destination);
                osc.start();
                osc.stop(sharedAudioContext.currentTime + 0.05);
            } catch (e) {}
        }

        function playBeep() {
            stopBeep();

            const beepPattern = () => {
                try {
                    if (!sharedAudioContext || sharedAudioContext.state === 'closed') {
                        sharedAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }

                    const doPlay = () => {
                        const oscillator = sharedAudioContext.createOscillator();
                        const gainNode = sharedAudioContext.createGain();

                        oscillator.connect(gainNode);
                        gainNode.connect(sharedAudioContext.destination);

                        oscillator.frequency.value = 800;
                        oscillator.type = 'sine';

                        gainNode.gain.setValueAtTime(0.25, sharedAudioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, sharedAudioContext.currentTime + 0.4);

                        oscillator.start(sharedAudioContext.currentTime);
                        oscillator.stop(sharedAudioContext.currentTime + 0.4);
                    };

                    if (sharedAudioContext.state === 'suspended') {
                        sharedAudioContext.resume().then(doPlay);
                    } else {
                        doPlay();
                    }
                } catch (e) {
                    console.error('Audio error:', e);
                }
            };

            let beepCount = 0;
            const playBeepCycle = () => {
                if (beepCount >= 10) {
                    stopBeep();
                    document.querySelectorAll('.btn-stop-sound').forEach(btn => {
                        btn.style.display = 'none';
                    });
                    return;
                }
                beepPattern();
                beepCount++;
                beepTimeoutId = setTimeout(playBeepCycle, 1000);
            };

            playBeepCycle();
        }

        function stopBeep() {
            if (beepTimeoutId) {
                clearTimeout(beepTimeoutId);
                beepTimeoutId = null;
            }
        }

        function updatePikminOffset() {
            const h = Math.max(0, Math.min(23, parseInt(document.getElementById('pikmin-hours').value) || 0));
            const m = Math.max(0, Math.min(59, parseInt(document.getElementById('pikmin-minutes').value) || 0));
            const s = Math.max(0, Math.min(59, parseInt(document.getElementById('pikmin-seconds').value) || 0));
            document.getElementById('pikmin-hours').value = String(h).padStart(2, '0');
            document.getElementById('pikmin-minutes').value = String(m).padStart(2, '0');
            document.getElementById('pikmin-seconds').value = String(s).padStart(2, '0');
            pikminOffsetSeconds = h * 3600 + m * 60 + s;
            timerCards.forEach(card => {
                if (card.state === 'idle' && card.pikminEnabled) card.applyPikminOffset();
            });
        }

        function updateStats() {
            const cards = document.querySelectorAll('.timer-card');
            let running = 0;
            let finished = 0;

            cards.forEach(card => {
                if (card.classList.contains('running')) running++;
                if (card.classList.contains('finished')) finished++;
            });

            document.getElementById('running-count').textContent = running;
            document.getElementById('finished-count').textContent = finished;
        }

        function addTimer() {
            const newId = timerCards.length + 1;
            timerCards.push(new TimerCard(newId));
        }

        document.getElementById('btn-add-timer').addEventListener('click', addTimer);
        ['pikmin-hours', 'pikmin-minutes', 'pikmin-seconds'].forEach(id => {
            document.getElementById(id).addEventListener('change', updatePikminOffset);
        });
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && sharedAudioContext && sharedAudioContext.state === 'suspended') {
                sharedAudioContext.resume();
            }
        });

        window.addEventListener('load', () => {
            timerCards.push(new TimerCard(1));
            timerCards.push(new TimerCard(2));
            timerCards.push(new TimerCard(3));
        });
    </script>
</body>
</html>
